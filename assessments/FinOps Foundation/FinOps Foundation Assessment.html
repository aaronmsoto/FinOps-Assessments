  display: block;
  padding: 6px 10px;
  margin: 2px 0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}

.assess-bucket label:hover {
  background: #f0f0f0;
}

.assess-bucket input[type="checkbox"] {
  margin-right: 8px;
  accent-color: #00C693;
}

/* Linear — radio buttons */
.assess-linear label {
  display: block;
  padding: 6px 10px;
  margin: 2px 0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}

.assess-linear label:hover {
  background: #f0f0f0;
}

.assess-linear input[type="radio"] {
  margin-right: 8px;
  accent-color: #00C693;
}

/* Value — numeric input */
.assess-value {

  align-items: center;
  gap: 8px;

.assess-value select {

/* === config.css === */

}

}

.config-btn-action {

.config-btn-action.danger:hover {

/* === poster.css === */
/* Poster View — adapted from finops.org/framework poster layout */

.poster {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
  font-family: 'IBM Plex Sans', sans-serif;
}

.poster .grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

@media (max-width: 1280px) {
  .poster .grid-2 {
    grid-template-columns: 1fr;
  }
}

/* Domain cards */
.poster .domain-card {
  background: #CCF4E9;
  border-radius: 12px;
  padding: 12px;
}

.poster .domain-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.poster .domain-title {
  font-size: 16px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.92);
  margin: 0;
}

.poster .domain-score {
  font-size: 14px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.56);
  background: rgba(255, 255, 255, 0.6);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.poster .domain-priority {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 8px;
}

.poster .domain-priority select {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 1px 4px;
  border: 1px solid rgba(0, 0, 0, 0.2);
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
  width: 40px;
}

.poster .domain-priority label {
  font-size: 11px;
  color: rgba(0, 0, 0, 0.4);
  font-weight: 500;
}

/* Capability cards within domains */
.poster .capabilities-grid {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.poster .cap-card {
  background: #fff;
  border-radius: 6px;
  min-width: 140px;
  flex: 1 1 auto;
  padding: 0;
  overflow: hidden;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}

.poster .cap-card:hover {
  border-color: #007758;
}

.poster .cap-card-inner {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  position: relative;
  z-index: 1;
}

.poster .cap-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.2;
  color: rgba(0, 0, 0, 0.92);
  flex: 1;
}

.poster .cap-score {
  font-size: 13px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.56);
  margin-left: 8px;
  white-space: nowrap;
}

.poster .cap-score.scored {
  color: rgba(0, 0, 0, 0.8);
}

/* Score bar fill behind capability card */
.poster .cap-card {
  position: relative;
}

.poster .cap-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  border-radius: 6px 0 0 6px;
  transition: width 0.3s ease, background-color 0.3s ease;
  z-index: 0;
  opacity: 0.25;
}

/* Capability hidden/excluded state */
.poster .cap-card.excluded {
  opacity: 0.35;
}

.poster .cap-card.excluded .cap-bar {
  display: none;
}

/* Overall score display */
#overall-score-container {
  max-width: 1200px;
  margin: 16px auto 0;
  padding: 0 16px;
  display: flex;
  justify-content: center;
}

.overall-score {
  text-align: center;
  padding: 12px 32px;
  background: #f8f9fa;
  border-radius: 8px;
}

.overall-score .label {
  font-size: 13px;
  font-weight: 500;
  color: rgba(0, 0, 0, 0.56);
  margin-bottom: 4px;
}

.overall-score .value {
  font-size: 28px;
  font-weight: 700;
  color: rgba(0, 0, 0, 0.8);
}

.overall-score .value.unscored {
  color: rgb(200, 200, 200);
}


/* === print.css === */
/* Print Styles */

@media print {
  /* Hide interactive elements */
  #app-header nav,
  .config-btn,
  .config-panel,
  .tab-btn,
  .domain-priority select,
  #tab-assess,
  #validation-error,
  footer a {
    display: none !important;
  }

  /* Show all content */
  #tab-results {
    display: block !important;
  }

  /* Clean layout */
  body {
    margin: 0;
    padding: 0;
    font-size: 11pt;
  }

  #app-header {
    background: none !important;
    box-shadow: none !important;
    border-bottom: 2px solid #0080AF;
    padding: 8px 0;
  }

  .poster {
    padding: 8px 0;
  }

  .poster .domain-card {
    break-inside: avoid;
  }

  .poster .cap-card {
    break-inside: avoid;
  }

  /* Footer attribution */
  #app-footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    font-size: 9pt;
    color: rgba(0, 0, 0, 0.5);
    border-top: 1px solid #e0e0e0;
    padding: 4px 0;
  }

  footer a {
    display: inline !important;
    color: rgba(0, 0, 0, 0.5) !important;
    text-decoration: none !important;
  }

  /* Domain priority as static text */
  .domain-priority-print {
    display: inline !important;
    font-size: 10pt;
    color: rgba(0, 0, 0, 0.5);
  }
}

/* Hide print-only elements on screen */
.domain-priority-print {
  display: none;
}

  <script>
/* === scoring.js === */
/* Scoring Engine — replicates finopspp Python scoring logic */

const Scoring = (() => {
  function getScoreColor(score) {
    if (score === null || score === undefined) return 'rgb(200, 200, 200)';
    if (score >= 7.5) return 'rgb(0, 198, 147)';
    if (score >= 5.0) return 'rgb(0, 150, 100)';
    if (score >= 2.5) return 'rgb(0, 100, 50)';
    return 'rgb(100, 100, 100)';
  }

  function computeActionScore(action, response) {
    if (response === null || response === undefined) return null;

    switch (action.scoreType) {
      case 'binary':
        return typeof response === 'number' ? response : null;

      case 'bucket': {
        if (!Array.isArray(response)) return null;
        const checkedCount = response.filter(Boolean).length;
        const items = parseBucketItems(action.formula);
        const totalItems = items.length;
        if (totalItems === 0) return null;
        return 10 * Math.ceil(checkedCount / totalItems);
      }

      case 'linear':
        return typeof response === 'number' ? response : null;

      case 'value':
        return typeof response === 'number' ? response : null;

      default:
        return null;
    }
  }

  function parseBucketItems(formula) {
    if (!formula) return [];
    return formula.split('\n')
      .filter(line => line.trim().startsWith('*'))
      .map(line => line.trim().replace(/^\*\s*/, ''));
  }

  function computeCapabilityScore(capability, responses, config) {
    let weightedSum = 0;
    let totalWeight = 0;

    for (const action of capability.actions) {
      const weight = getEffectiveWeight(action, config);
      if (weight <= 0) continue;

      const response = responses[action.id];
      const score = computeActionScore(action, response);
      if (score === null) continue;

      weightedSum += score * weight;
      totalWeight += weight;
    }

    return totalWeight > 0 ? weightedSum / totalWeight : null;
  }

  function computeDomainScore(domain, responses, config) {
    let sum = 0;
    let count = 0;

    for (const cap of domain.capabilities) {
      if (isCapabilityHidden(cap, config)) continue;

      const score = computeCapabilityScore(cap, responses, config);
      if (score === null) continue;

      sum += score;
      count++;
    }

    return count > 0 ? sum / count : null;
  }

  function computeOverallScore(domains, responses, config) {
    let sum = 0;
    let count = 0;

    for (const domain of domains) {
      const score = computeDomainScore(domain, responses, config);
      if (score === null) continue;

      sum += score;
      count++;
    }

    return count > 0 ? sum / count : null;
  }

  function getEffectiveWeight(action, config) {
    if (config && config.weights && config.weights[action.id] !== undefined) {
      return config.weights[action.id];
    }
    return action.weight;
  }

  function isCapabilityHidden(capability, config) {
    if (config && config.hiddenCapabilities) {
      return config.hiddenCapabilities.includes(capability.id);
    }
    return false;
  }

  function formatScore(score) {
    if (score === null || score === undefined) return '—';
    return score.toFixed(1);
  }

  function computeAllScores(specData, responses, config) {
    const result = { domains: [], overall: null };

    for (const domain of specData.domains) {
      const domainResult = {
        id: domain.id,
        title: domain.title,
        score: computeDomainScore(domain, responses, config),
        capabilities: []
      };

      for (const cap of domain.capabilities) {
        const hidden = isCapabilityHidden(cap, config);
        const capResult = {
          id: cap.id,
          title: cap.title,
          score: hidden ? null : computeCapabilityScore(cap, responses, config),
          hidden: hidden,
          actions: []
        };

        for (const action of cap.actions) {
          const weight = getEffectiveWeight(action, config);
          const response = responses[action.id];
          capResult.actions.push({
            id: action.id,
            title: action.title,
            score: weight > 0 ? computeActionScore(action, response) : null,
            weight: weight,
            responded: response !== null && response !== undefined
          });
        }

        domainResult.capabilities.push(capResult);
      }

      result.domains.push(domainResult);
    }

    result.overall = computeOverallScore(specData.domains, responses, config);
    return result;
  }

  return {
    getScoreColor,
    computeActionScore,
    parseBucketItems,
    computeCapabilityScore,
    computeDomainScore,
    computeOverallScore,
    getEffectiveWeight,
    isCapabilityHidden,
    formatScore,
    computeAllScores
  };
})();


/* === storage.js === */
/* Persistence — localStorage auto-save, JSON export/import, Save As HTML */

const Storage = (() => {
  const STORAGE_KEY = 'finops-assessment-state';

  function save(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.warn('Failed to save to localStorage:', e);
    }
  }

  function load(specData) {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        return {
          responses: saved.responses || {},
          config: saved.config || {},
          priorities: saved.priorities || {}
        };
      }
    } catch (e) {
      console.warn('Failed to load from localStorage:', e);
    }
    return { responses: {}, config: {}, priorities: {} };
  }

  function exportJSON() {
    const state = App.getState();
    const data = {
      exportedAt: new Date().toISOString(),
      version: '1.0',
      ...state
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    downloadBlob(blob, generateFilename('json'));
  }

  function importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const data = JSON.parse(evt.target.result);
          const newState = {
            responses: data.responses || {},
            config: data.config || {},
            priorities: data.priorities || {}
          };
          App.setState(newState);
        } catch (err) {
          alert('Failed to import: ' + err.message);
        }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function generateFilename(ext) {
    const state = App.getState();
    const title = (state.config.title || 'FinOps Maturity Assessment').replace(/[^a-zA-Z0-9 ]/g, '');
    const date = new Date().toISOString().split('T')[0];
    return `${title} - ${date}.${ext}`;
  }

  return { save, load, exportJSON, importJSON, downloadBlob, generateFilename };
})();

    }

    html += '</div></div>';
    container.innerHTML = html;

    // Render overall score
    const overallContainer = document.getElementById('overall-score-container');
    if (overallContainer) {
      overallContainer.innerHTML = `
        <div class="overall-score">
          <div class="label">Overall Score</div>
          <div class="value unscored" id="overall-score-value">—</div>
        </div>`;
    }

    // Bind priority dropdowns
    container.querySelectorAll('[data-domain-priority]').forEach(sel => {
      sel.addEventListener('change', (e) => {
        const domainId = parseInt(e.target.dataset.domainPriority);
        const rank = e.target.value ? parseInt(e.target.value) : null;
        App.setPriority(domainId, rank);
        // Update print text
        const printSpan = e.target.parentElement.querySelector('.domain-priority-print');
        if (printSpan) printSpan.textContent = '#' + (rank || '—');
      });
    });
  }

  function update(scores, state) {
    // Update domain scores
    for (const domain of scores.domains) {
      const el = document.querySelector(`[data-domain-score="${domain.id}"]`);
      if (el) {
        el.textContent = Scoring.formatScore(domain.score);
        el.style.color = domain.score !== null ? Scoring.getScoreColor(domain.score) : '';
      }

      // Update capability scores and bars
      for (const cap of domain.capabilities) {
        const scoreEl = document.querySelector(`[data-cap-score="${cap.id}"]`);
        if (scoreEl) {
          scoreEl.textContent = Scoring.formatScore(cap.score);
          if (cap.score !== null) {
            scoreEl.classList.add('scored');
          } else {
            scoreEl.classList.remove('scored');
          }
        }

        const barEl = document.querySelector(`[data-cap-bar="${cap.id}"]`);
        if (barEl) {
          if (cap.score !== null && !cap.hidden) {
            barEl.style.width = (cap.score * 10) + '%';
            barEl.style.backgroundColor = Scoring.getScoreColor(cap.score);
          } else {
            barEl.style.width = '0%';
          }
        }

        const cardEl = document.querySelector(`[data-cap-id="${cap.id}"]`);
        if (cardEl) {
          if (cap.hidden) {
            cardEl.classList.add('excluded');
          } else {
            cardEl.classList.remove('excluded');
          }
        }
      }
    }

    // Update overall score
    const overallEl = document.getElementById('overall-score-value');
    if (overallEl) {
      overallEl.textContent = Scoring.formatScore(scores.overall);
      if (scores.overall !== null) {
        overallEl.classList.remove('unscored');
        overallEl.style.color = Scoring.getScoreColor(scores.overall);
      } else {
        overallEl.classList.add('unscored');
        overallEl.style.color = '';
      }
    }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  return { render, update };
})();


/* === assess.js === */
/* Assess Tab — render questionnaire, handle input by score type */

const Assess = (() => {
  function render(specData, state) {
    const container = document.getElementById('assess-container');
    if (!container) return;

    let html = '';

    for (const domain of specData.domains) {
      html += `<div class="assess-domain" data-assess-domain="${domain.id}">`;
      html += `<h2 class="assess-domain-header">${esc(domain.title)}`;
      html += `<span class="assess-domain-progress" data-domain-progress="${domain.id}"></span>`;
      html += `</h2>`;

      for (const cap of domain.capabilities) {
        const hidden = Scoring.isCapabilityHidden(cap, state.config);
        if (hidden) continue;

        html += `<div class="assess-capability" data-assess-cap="${cap.id}">`;
        html += `<div class="assess-cap-header">`;
        html += `<h3 class="assess-cap-title">${esc(cap.title)}</h3>`;
        html += `<span class="assess-cap-progress" data-cap-progress="${cap.id}"></span>`;
        html += `</div>`;

        for (const action of cap.actions) {
          const weight = Scoring.getEffectiveWeight(action, state.config);
          if (weight <= 0) continue;

          const response = state.responses[action.id];
          const answered = response !== null && response !== undefined;

          html += `<div class="assess-action${answered ? ' answered' : ''}" data-assess-action="${action.id}">`;
          html += `<div class="assess-action-title">${esc(action.title)}</div>`;
          if (action.description) {
            html += `<div class="assess-action-desc">${esc(action.description)}</div>`;
          }
          html += `<div class="assess-action-score" data-action-score="${action.id}">—</div>`;
          html += renderInput(action, response);
          html += `</div>`;
        }

        html += `</div>`;
      }

      html += `</div>`;
    }

    container.innerHTML = html;
    bindInputs(specData);
  }

  function renderInput(action, response) {
    switch (action.scoreType) {
      case 'binary':
        return renderBinary(action, response);
      case 'bucket':
        return renderBucket(action, response);
      case 'linear':
        return renderLinear(action, response);
      case 'value':
        return renderValue(action, response);
      default:
        return '<div>Unknown score type</div>';
    }
  }

  function renderBinary(action, response) {
    let html = `<div class="assess-binary" data-input-action="${action.id}" data-score-type="binary">`;
    for (const opt of action.scoring) {
      const checked = response === opt.score ? ' checked' : '';
      html += `<label>`;
      html += `<input type="radio" name="action-${action.id}" value="${opt.score}"${checked}>`;
      html += `${esc(opt.condition)}`;
      html += `</label>`;
    }
    html += `</div>`;
    return html;
  }

  function renderBucket(action, response) {
    const items = Scoring.parseBucketItems(action.formula);
    const checked = Array.isArray(response) ? response : [];

    let html = `<div class="assess-bucket" data-input-action="${action.id}" data-score-type="bucket">`;
    items.forEach((item, i) => {
      const isChecked = checked[i] ? ' checked' : '';
      html += `<label>`;
      html += `<input type="checkbox" data-index="${i}"${isChecked}>`;
      html += `${esc(item)}`;
      html += `</label>`;
    });
    html += `</div>`;
    return html;
  }

  function renderLinear(action, response) {
    let html = `<div class="assess-linear" data-input-action="${action.id}" data-score-type="linear">`;
    for (const opt of action.scoring) {
      const checked = response === opt.score ? ' checked' : '';
      html += `<label>`;
      html += `<input type="radio" name="action-${action.id}" value="${opt.score}"${checked}>`;
      html += `${esc(opt.condition)} (${opt.score})`;
      html += `</label>`;
    }
    html += `</div>`;
    return html;
  }

  function renderValue(action, response) {
    let html = `<div class="assess-value" data-input-action="${action.id}" data-score-type="value">`;
    html += `<select>`;
    html += `<option value="">Select...</option>`;
    for (const opt of action.scoring) {
      const selected = response === opt.score ? ' selected' : '';
      html += `<option value="${opt.score}"${selected}>${esc(opt.condition)} (${opt.score})</option>`;
    }
    html += `</select>`;
    html += `</div>`;
    return html;
  }

  function bindInputs(specData) {
    // Binary and linear (radio)
    document.querySelectorAll('[data-score-type="binary"], [data-score-type="linear"]').forEach(div => {
      div.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', () => {
          const actionId = parseInt(div.dataset.inputAction);
          App.setResponse(actionId, parseInt(radio.value));
          div.closest('.assess-action').classList.add('answered');
        });
      });
    });

    // Bucket (checkboxes)
    document.querySelectorAll('[data-score-type="bucket"]').forEach(div => {
      const actionId = parseInt(div.dataset.inputAction);
      div.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const checks = [];
          div.querySelectorAll('input[type="checkbox"]').forEach(c => {
            checks[parseInt(c.dataset.index)] = c.checked;
          });
          App.setResponse(actionId, checks);
          const any = checks.some(Boolean);
          div.closest('.assess-action').classList.toggle('answered', any);
        });
      });
    });

    // Value (select)
    document.querySelectorAll('[data-score-type="value"]').forEach(div => {
      div.querySelector('select').addEventListener('change', (e) => {
        const actionId = parseInt(div.dataset.inputAction);
        const val = e.target.value ? parseInt(e.target.value) : null;
        App.setResponse(actionId, val);
        div.closest('.assess-action').classList.toggle('answered', val !== null);
      });
    });
  }

  function updateScores(scores) {
    for (const domain of scores.domains) {
      // Domain progress
      const domainProg = document.querySelector(`[data-domain-progress="${domain.id}"]`);
      if (domainProg) {
        let answered = 0, total = 0;
        for (const cap of domain.capabilities) {
          if (cap.hidden) continue;
          for (const action of cap.actions) {
            if (action.weight > 0) {
              total++;
              if (action.responded) answered++;
            }
          }
        }
        domainProg.textContent = total > 0 ? `${answered} / ${total}` : '';
      }

      for (const cap of domain.capabilities) {
        // Capability progress
        const capProg = document.querySelector(`[data-cap-progress="${cap.id}"]`);
        if (capProg) {
          let answered = 0, total = 0;
          for (const action of cap.actions) {
            if (action.weight > 0) {
              total++;
              if (action.responded) answered++;
            }
          }
          capProg.textContent = total > 0 ? `${answered} of ${total}` : '';
        }

        // Action scores
        for (const action of cap.actions) {
          const el = document.querySelector(`[data-action-score="${action.id}"]`);
          if (el) {
            el.textContent = Scoring.formatScore(action.score);
            if (action.score !== null) {
              el.classList.add('scored');
            }
          }
        }
      }
    }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  return { render, updateScores };
})();

    html += `<input type="text" id="config-title" value="${esc(state.config.title || 'FinOps Maturity Assessment')}" placeholder="Assessment title">`;
    html += `</div>`;
    html += `<div class="config-field">`;
    html += `<label for="config-subtitle">Subtitle</label>`;
    html += `<input type="text" id="config-subtitle" value="${esc(state.config.subtitle !== undefined ? state.config.subtitle : 'Measure progress over time against accepted standards')}" placeholder="Optional subtitle">`;
    html += `</div>`;
    html += `</div>`;

    // Capability visibility
    html += `<div class="config-section">`;
    html += `<h3>Capability Visibility</h3>`;
    const hiddenCaps = (state.config.hiddenCapabilities || []);

    for (const domain of specData.domains) {
      html += `<div class="config-cap-group">`;
      html += `<div class="config-cap-group-title">${esc(domain.title)}</div>`;

      for (const cap of domain.capabilities) {
        const checked = !hiddenCaps.includes(cap.id) ? ' checked' : '';
        html += `<div class="config-cap-item">`;
        html += `<input type="checkbox" id="cap-vis-${cap.id}" data-cap-vis="${cap.id}"${checked}>`;
        html += `<label for="cap-vis-${cap.id}">${esc(cap.title)}</label>`;
        html += `</div>`;
      }

      html += `</div>`;
    }
    html += `</div>`;

    // Weight overrides
    html += `<div class="config-section">`;
    html += `<h3>Action Weights</h3>`;
    html += `<table class="config-weights-table">`;
    html += `<thead><tr><th>Action</th><th>Weight</th><th>Spec</th></tr></thead>`;
    html += `<tbody>`;

    for (const domain of specData.domains) {
      for (const cap of domain.capabilities) {
        for (const action of cap.actions) {
          const currentWeight = Scoring.getEffectiveWeight(action, state.config);
          html += `<tr>`;
          html += `<td title="${esc(cap.title)}">${esc(action.title)}</td>`;
          html += `<td><input type="number" data-weight-action="${action.id}" value="${currentWeight}" min="0" max="10" step="0.1"></td>`;
          html += `<td class="original-weight">${action.weight}</td>`;
          html += `</tr>`;
        }
      }
    }

    html += `</tbody></table>`;
    html += `</div>`;

    // Data management
    html += `<div class="config-section">`;
    html += `<h3>Data Management</h3>`;
    html += `<div class="config-actions">`;
    html += `<button class="config-btn-action" id="config-export">Export JSON</button>`;
    html += `<button class="config-btn-action" id="config-import">Import JSON</button>`;
    html += `<button class="config-btn-action danger" id="config-reset">Reset All</button>`;
    html += `</div>`;
    html += `</div>`;

    container.innerHTML = html;
    bindEvents(specData, state);
  }

  function bindEvents(specData, state) {
    // Title
    document.getElementById('config-title').addEventListener('input', (e) => {
      App.setConfig('title', e.target.value);
    });

    // Subtitle
    document.getElementById('config-subtitle').addEventListener('input', (e) => {
      App.setConfig('subtitle', e.target.value);
    });

    // Capability visibility
    document.querySelectorAll('[data-cap-vis]').forEach(cb => {
      cb.addEventListener('change', () => {
        const capId = parseInt(cb.dataset.capVis);
        const currentState = App.getState();
        const hidden = currentState.config.hiddenCapabilities || [];
        if (cb.checked) {
          App.setConfig('hiddenCapabilities', hidden.filter(id => id !== capId));
        } else {
          App.setConfig('hiddenCapabilities', [...hidden, capId]);
        }
        // Re-render assess tab to hide/show capabilities
        Assess.render(App.getSpecData(), App.getState());
        App.recalculate();
      });
    });

    // Weight overrides
    document.querySelectorAll('[data-weight-action]').forEach(input => {
      input.addEventListener('change', () => {
        const actionId = parseInt(input.dataset.weightAction);
        const weight = parseFloat(input.value) || 0;
        const currentState = App.getState();
        const weights = currentState.config.weights || {};
        weights[actionId] = weight;
        App.setConfig('weights', weights);
        // Re-render assess to hide zero-weight actions
        Assess.render(App.getSpecData(), App.getState());
        App.recalculate();
      });
    });

    // Export
    document.getElementById('config-export').addEventListener('click', () => {
      Storage.exportJSON();
    });

    // Import
    document.getElementById('config-import').addEventListener('click', () => {
      Storage.importJSON();
    });

    // Reset
    document.getElementById('config-reset').addEventListener('click', () => {
      if (confirm('Reset all responses, configuration, and priorities? This cannot be undone.')) {
        App.setState({ responses: {}, config: {}, priorities: {} });
      }
    });
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  return { render };
})();

/* === app.js === */
/* App Shell — initialization, tab switching, event bus, data validation */

const App = (() => {
  let specData = null;
  let state = { responses: {}, config: {}, priorities: {} };
  const listeners = {};

  function init() {
    specData = loadAndValidateData();
    if (!specData) return;

    state = Storage.load(specData);

    initTabs();
    initConfig();

    Poster.render(specData, state);
    Assess.render(specData, state);
    Config.render(specData, state);

    applyConfig();
    recalculate();
  }

  function loadAndValidateData() {
    const el = document.getElementById('spec-data');
    if (!el) {
      showError('No data block found. The assessment file may be corrupted.');
      return null;
    }

    let data;
    try {
      data = JSON.parse(el.textContent);
    } catch (e) {
      showError('Invalid JSON in data block: ' + e.message);
      return null;
    }

    const error = validateData(data);
    if (error) {
      showError(error);
      return null;
    }

    return data;
  }

  function validateData(data) {
    if (!data || typeof data !== 'object') return 'Data block is not a valid object.';
    if (!data.profile) return 'Missing "profile" in data.';
    if (!Array.isArray(data.domains)) return 'Missing or invalid "domains" array.';

    for (let i = 0; i < data.domains.length; i++) {
      const d = data.domains[i];
      if (!d.id || !d.title) return `Domain at index ${i} missing "id" or "title".`;
      if (!Array.isArray(d.capabilities)) return `Domain "${d.title}" missing "capabilities" array.`;

      for (let j = 0; j < d.capabilities.length; j++) {
        const c = d.capabilities[j];
        if (!c.id || !c.title) return `Capability at index ${j} in "${d.title}" missing "id" or "title".`;
        if (!Array.isArray(c.actions)) return `Capability "${c.title}" missing "actions" array.`;

        for (let k = 0; k < c.actions.length; k++) {
          const a = c.actions[k];
          if (!a.id || !a.title) return `Action at index ${k} in "${c.title}" missing "id" or "title".`;
          if (!a.scoreType) return `Action "${a.title}" missing "scoreType".`;
          const validTypes = ['binary', 'bucket', 'linear', 'value'];
          if (!validTypes.includes(a.scoreType)) {
            return `Action "${a.title}" has invalid scoreType "${a.scoreType}". Must be one of: ${validTypes.join(', ')}.`;
          }
          if (!Array.isArray(a.scoring)) return `Action "${a.title}" missing "scoring" array.`;
        }
      }
    }

    return null;
  }

  function showError(message) {
    const el = document.getElementById('validation-error');
    if (el) {
      el.textContent = message;
      el.classList.remove('hidden');
    }
    const main = document.getElementById('app-main');
    if (main) main.style.display = 'none';
  }

  function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => {
          t.classList.add('hidden');
          t.classList.remove('active');
        });
        btn.classList.add('active');
        const tab = document.getElementById('tab-' + btn.dataset.tab);
        if (tab) {
          tab.classList.remove('hidden');
          tab.classList.add('active');
        }
      });
    });
  }

  function initConfig() {
    const openBtn = document.querySelector('.config-btn');
    const panel = document.getElementById('config-panel');
    const closeBtn = panel.querySelector('.config-close');
    const overlay = panel.querySelector('.config-overlay');

    openBtn.addEventListener('click', () => panel.classList.remove('hidden'));
    closeBtn.addEventListener('click', () => panel.classList.add('hidden'));
    overlay.addEventListener('click', () => panel.classList.add('hidden'));
  }

  function applyConfig() {
    const title = (state.config.title || specData.profile.title || 'FinOps Maturity Assessment');
    const subtitle = (state.config.subtitle !== undefined ? state.config.subtitle : 'Measure progress over time against accepted standards');

    document.getElementById('assessment-title').textContent = title;
    document.getElementById('assessment-subtitle').textContent = subtitle;
    document.title = title;
  }

  function setResponse(actionId, value) {
    state.responses[actionId] = value;
    recalculate();
    Storage.save(state);
    emit('responseChanged', { actionId, value });
  }

  function setConfig(key, value) {
    state.config[key] = value;
    applyConfig();
    recalculate();
    Storage.save(state);
    emit('configChanged', { key, value });
  }

  function setPriority(domainId, rank) {
    state.priorities[domainId] = rank;
    Storage.save(state);
    emit('priorityChanged', { domainId, rank });
  }

  function recalculate() {
    const scores = Scoring.computeAllScores(specData, state.responses, state.config);
    Poster.update(scores, state);
    Assess.updateScores(scores);
  }

  function getState() { return state; }
  function getSpecData() { return specData; }

  function setState(newState) {
    state = newState;
    applyConfig();
    Poster.render(specData, state);
    Assess.render(specData, state);
    Config.render(specData, state);
    recalculate();
    Storage.save(state);
  }

  function on(event, fn) {
    if (!listeners[event]) listeners[event] = [];
    listeners[event].push(fn);
  }

  function emit(event, data) {
    (listeners[event] || []).forEach(fn => fn(data));
  }

  document.addEventListener('DOMContentLoaded', init);

  return { setResponse, setConfig, setPriority, getState, getSpecData, setState, on, recalculate };
})();
