Specification:
  ID: 116
  Title: Prioritize Actions & Publish Roadmap
  Description: Prioritize actions; publish an improvement roadmap with owners/dates.
  Slug: 116-actions-roadmap
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    1. Invite subject matter experts (SMEs) and leadership to determine which gaps to address first
    2. Determine owners for addressing each of the prioritized gaps
    3. Owners will work with relevant teams to scope out how to meet the target score for each gap
    4. Work is then scheduled in a roadmap with deadlines that can be tracked at the leadership level
  Score Type: sequential
  Scoring:
  - Score: 0
    Condition: No items completed
  - Score: 3
    Condition: item 1 completed
  - Score: 5
    Condition: items 1, and 2 completed
  - Score: 8
    Condition: items 1, 2, and 3 completed
  - Score: 10
    Condition: items 1, 2, 3, and 4 completed
  References:
  - Name: NIST Gap Analysis Example Implementation
    Link: csrc.nist.gov/CSRC/media/Projects/Forum/documents/aug-2016/tues1230_pbgc_tier2-program.pdf
    Comment: A real-world example of the gap analysis process from start to end in
      cybersecurity.
  - Name: Free Project Management Course from PMI
    Link: https://www.pmi.org/kickoff
    Comment: |-
      Once you have your maturity projects prioritized, you will need to plan the work.
      This may not all fall to the FinOps team to organize, but this gives a good overview of what is involved.
  Supplemental Guidance:
  - |-
    Weights are about maturity priority and which actions are important to the business' goals.
    Here, priority is about what to work on first to get the most ROI from work to close the maturity gaps.
  - Ensure that planned work reflects the realities of team development lifecycles,
    such as agile, waterfall, etc.
  Overrides: null
