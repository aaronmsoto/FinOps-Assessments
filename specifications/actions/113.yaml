Specification:
  ID: 113
  Title: Define Assessment Scope & Goals
  Description: Define goals/scope; pick capabilities to measure this cycle.
  Slug: 113-define-assess
  Implementation Types:
  - null
  Weight: 1.0
  Formula: |-
    * Select which teams or groups are in scope for the planned assessments
    * Select which capabilities/actions are in scope for each group's assessment
    * Select weights for each included action based on goals of the assessment and importance to the business
    * Set a preliminary target score for each included action to use for comparison

    10*Ceil(x/4)
  Score Type: bucket
  Scoring:
  - Score: 0
    Condition: 0 items completed
  - Score: 3
    Condition: 1 item completed
  - Score: 5
    Condition: 2 items completed
  - Score: 8
    Condition: 3 items completed
  - Score: 10
    Condition: 4 items completed
  References:
  - Name: FinOps Foundation Assessment Stage 1
    Link: https://www.finops.org/wg/finops-assessment/#assessment-stage-1-introduction
    Comment: Target groups and testing parameters needed before starting any assessment
  - Name: FinOps++ Scoring
    Link: https://github.com/FinOpsPP/Framework-Assessment/blob/main/guidelines/scoring.md
    Comment: Scoring guidance used by the FinOps++ Project for all actions.
  Supplemental Guidance:
  - |-
    For the last item in the formula list, references for what targets include can
    be found in scoring guideline document linked in references.
  Overrides: null
