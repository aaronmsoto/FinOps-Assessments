Specification:
  ID: 20
  Title: Embed Reports in Workflows
  Description: Embed reports into workflows (Slack/Jira/Teams) and set alerting.
  Slug: 20-embed-reports
  Implementation Types:
  - null
  Weight: 1.0
  Formula: null
  Score Type: percent
  Scoring:
  - Score: 0
    Condition: No alerting in workflow tools
  - Score: 1
    Condition: Alerting in at least one tool
  - Score: 3
    Condition: Alerting in some tooling [>20%]
  - Score: 6
    Condition: Alerting in most tooling [>60%]
  - Score: 10
    Condition: Alerting in all workflow tools [100%]
  References:
  - Name: null
    Link: null
    Comment: null
  Supplemental Guidance:
  - |-
    Scoring for this actions is treated as percent. That means that if you have
    alerting in most tooling, for example, you have implicitly achieved it in some
    toolings already.
  Overrides: null
