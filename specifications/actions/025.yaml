Specification:
  ID: 25
  Title: Automate Alert Routing
  Description: Automate alert routing to owners via existing channels (email/Slack/Teams).
  Slug: 25-automate-alert
  Implementation Types:
  - null
  Weight: 1.0
  Formula: null
  Score Type: percent
  Scoring:
  - Score: 0
    Condition: No alerting to any owners
  - Score: 1
    Condition: Alerting in at least one owner
  - Score: 3
    Condition: Alerting to some owners [>20%]
  - Score: 6
    Condition: Alerting to most owners [>60%]
  - Score: 10
    Condition: Alerting to all owners [100%]
  References:
  - Name: null
    Link: null
    Comment: null
  Supplemental Guidance:
  - |-
    Scoring for this actions is treated as percent. That means that if you have
    alerting to most owners, for example, you have implicitly achieved it in some
    owners already.
  Overrides: null
